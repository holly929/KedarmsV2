      - name: Get changed JavaScript/TypeScript files
        id: changed-js-ts-files
        uses: tj-actions/changed-files@v40
        with:
          files: |
            **/*.js
            **/*.jsx
            **/*.ts
            **/*.tsx

      - name: Run ESLint on changed files
        if: steps.changed-js-ts-files.outputs.any_changed == 'true'
        run: |
          CHANGED_FILES="${{ steps.changed-js-ts-files.outputs.all_changed_files }}"
          echo "Linting changed files: $CHANGED_FILES"
          # Run ESLint directly, using the config file and the list of changed files
          ./node_modules/.bin/eslint --config eslint.config.mjs $CHANGED_FILES

      - name: Run TypeScript check
        run: npm run type-check